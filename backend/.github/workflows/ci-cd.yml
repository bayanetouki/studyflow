name: CI/CD - StudyFlow PFA

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : TESTS UNITAIRES
  # ─────────────────────────────────────────────
  test:
    name: Tests Unitaires
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: studyflow_test
          POSTGRES_USER: studyflow_user
          POSTGRES_PASSWORD: studyflow_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: test-secret-key-github-actions-pfa-2026
      DEBUG: "True"
      DATABASE_URL: postgres://studyflow_user:studyflow_pass@localhost:5432/studyflow_test
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run migrations
        run: |
          cd backend
          python manage.py migrate

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v

      - name: Generate coverage report
        run: |
          cd backend
          coverage run -m pytest tests/
          coverage report

  # ─────────────────────────────────────────────
  # JOB 2 : QUALITE DU CODE
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Qualité du Code
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: test-secret-key-lint
      DEBUG: True
      DATABASE_URL: sqlite:///db.sqlite3
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Configuration Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: 🔍 Vérification du style (flake8)
        run: |
          flake8 apps/ studyflow/ --max-line-length=120 --exclude=migrations
  # ─────────────────────────────────────────────
  # JOB 3 : BUILD DOCKER
  # ─────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          cd backend
          docker build -t studyflow-backend:latest .

      - name: Test Docker image
        run: |
          docker run --rm \
            -e SECRET_KEY=test-key \
            -e DEBUG=False \
            -e DATABASE_URL=sqlite:///db.sqlite3 \
            -e ALLOWED_HOSTS=localhost \
            studyflow-backend:latest \
            python manage.py check

  # ─────────────────────────────────────────────
  # JOB 4 : NOTIFICATION DE DEPLOY
  # ─────────────────────────────────────────────
  notify:
    name: Deploy Notification
    runs-on: ubuntu-latest
    needs: [test, lint, docker]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy success notification
        run: |
          echo "✅ Tous les tests passent !"
          echo "✅ Code quality OK !"
          echo "✅ Docker build OK !"
          echo "🚀 Render déploie automatiquement depuis main"
          echo "URL: https://studyflow-backend.onrender.com"